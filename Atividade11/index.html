<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Classes JS</title>
</head>

<body>
    <script>
        var aluno1 = new Object();
        aluno1.ra = '00242220';
        aluno1.nome = 'Eduardo Silva';
        alert(`ra=${aluno1.ra} nome = ${aluno1.nome}`);

        var aluno2 = {};
        aluno2.ra = '22222222';
        aluno2.nome = 'Maria';
        alert('ra=' + aluno2.ra + ' nome =' + aluno2.nome);
        aluno2["email do aluno"] = "maria@email.com";
        alert(aluno2["email do aluno"]);

        var aluno3 = { ra: "33333", nome: "Carlos" };
        alert("ra=" + aluno3.ra + " nome:" + aluno3.nome);

        function Aluno(ra, nome) {
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function () {
                return "ra=" + this.ra + " nome:" + this.nome;
            }
        }
        var aluno4 = new Aluno("44444", "Dudu");
        alert(aluno4.MostraDados());

        function Aluno2() {
            var ra;
            var nome;
            this.setRa = function (value) { this.ra = value; }
            this.getRa = function () { return this.ra; }
            this.setNome = function (value) { this.nome = value; }
            this.getNome = function () { return this.nome; }
        }
        var aluno6 = new Aluno2();
        aluno6.setNome("Fernanda");
        aluno6.setRa("6666666");
        alert("ra=" + aluno6.getRa() + " nome =" + aluno6.getNome());

        function AlunoADS() {
            var numLab;
            this.setNumLab = function (value) { this.numLab = value; }
            this.getNumLab = function () { return this.numLab; }
        }
        AlunoADS.prototype = new Aluno2();
        var aluno7 = new AlunoADS();
        aluno7.setNome("Rafael");
        aluno7.setRa("777");
        aluno7.setNumLab(5);
        alert(aluno7.getNome() + " Lab: " + aluno7.getNumLab());

        class AlunoClasse {
            constructor() {
                this._ra;
                this._nome;
            }
            setNome(value) { this._nome = value; }
            getNome() { return this._nome; }
            setRa(value) { this._ra = value; }
            getRa() { return this._ra; }
        }

        var objAluno = new AlunoClasse();
        objAluno.setNome("Beatriz");
        objAluno.setRa("999");
        alert(`Nome: ${objAluno.getNome()}, Ra: ${objAluno.getRa()}`);

        class AlunoADS1 extends AlunoClasse {
            constructor() {
                super();
                this._numLab;
            }
            setNumLab(value) { this._numLab = value; }
            getNumLab() { return this._numLab; }
        }
        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Joaquim");
        objAlunoADS.setRa("1010");
        objAlunoADS.setNumLab(6);
        alert(`nome= ${objAlunoADS.getNome()}, ra=${objAlunoADS.getRa()}, numlab: ${objAlunoADS.getNumLab()}`);

        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Camila";
        alert("Referência: " + obj2.nome);

        class ContaBancaria {
            #cpf;

            constructor(nome, saldoInicial) {
                this.nome = nome;
                this.saldo = saldoInicial;
            }

            setCPF(value) { this.#cpf = value; }
            getCPF() { return this.#cpf; }

            depositar(valor) {
                this.saldo += valor;
                this.#registraTransacao(valor);
            }

            #registraTransacao(valor) {
                console.log(`Depósito de R$ ${valor} realizado por ${this.nome}. Saldo atual: R$ ${this.saldo}. CPF: ${this.#cpf}`);
            }
        }

        const conta = new ContaBancaria("Gustavo", 100);
        conta.setCPF("123.456.789-00");
        conta.depositar(500);

        const arr = [['codigo', 1], ['nome', "João"], ['idade', 23]];
        const obj = Object.fromEntries(arr);
        alert("JSON do objeto: " + JSON.stringify(obj));



        const objEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const funcionario =
            Object.create(objEmpresa, {
                nome: {
                    value: 'Joege'
                },
                endereco: {
                    value: 'AV. sao paulo'
                }
            });
        console.log(funcionario.empresa);
        console.log(funcionario.nome);
        console.log(funcionario.endereco);

        const objNovoEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const objVeiculo = {
            placa: 'XXX 1234'
        }

        const motorista = Object.assign({
            cpf: '123'

        },
            objNovoEmpresa, objVeiculo);
        console.log(motorista);
    </script>
</body>

</html>
