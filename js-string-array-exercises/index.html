<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 9</title>
    <link rel="stylesheet" href="style.css">
    <!-- defer garante que o JS só executa após o DOM estar pronto -->
    <script src="Atividade9.js" defer></script>
</head>

<body>
    <div>
        <div class="card">
            <h3>Maior ou Ordem Crescente</h3>
            <div>
                <label>Número 1: </label>
                <input type="number" id="num1" placeholder="Digite o primeiro número" required>
                <br>
                <label>Número 2: </label>
                <input type="number" id="num2" placeholder="Digite o segundo número" required>
                <br>
                <label>Número 3: </label>
                <input type="number" id="num3" placeholder="Digite o terceiro número" required>
                <br>
                <p id="maiorNumero"></p>
                <button onclick="envNumerosMaior()" class="btn">Maior</button>
                <button onclick="envNumeroOrdem()" class="btn">Ordem Crescente</button>
            </div>
        </div>
        <br><br>

        <div class="card">
            <h3>Palíndromo</h3>
            <label>Palavra: </label>
            <input type="text" id="text1" placeholder="Digite uma palavra" required>
            <p id="resPalindromo"></p>
            <button onclick="envPalindromo()" class="btn">Verificar Palíndromo</button>
        </div>
        <br><br>

        <div class="card">
            <h3>Subconjunto</h3>
            <label>Palavra 1: </label>
            <input type="text" id="subconjunto1" placeholder="Digite a Palavra 1" required>
            <br>
            <label>Palavra 2: </label>
            <input type="text" id="subconjunto2" placeholder="Digite a Palavra 2" required>
            <p id="resSubconjunto"></p>
            <button onclick="envSubconjunto()" class="btn">Verificar Subconjunto</button>
        </div>
        <br><br>

        <div class="card">
            <h3>Dia da Semana</h3>
            <input type="date" id="escData">
            <p id="resData"></p>
            <button onclick="envData()" class="btn">Dia da Semana</button>
        </div>
    </div>
</body>

</html>
